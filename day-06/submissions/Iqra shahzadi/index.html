<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards Layout with BEM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="cards">

  <div class="card card--red">
    
    <div class="card__content card--green">
      <div class="card__title card--blue">Row 1</div>
      <div class="card__description card--blue">Row 2</div>
    </div>

    <div class="card__content card--green">
      <div class="card__icon card--blue"></div>
    </div>

  </div>

  <div class="card card--red">

    <div class="card__content card--green">
      <div class="card__title card--blue">Row 1</div>
      <div class="card__description card--blue">Row 2</div>
    </div>

    <div class="card__content card--green">
      <div class="card__icon card--blue"></div>
    </div>

  </div>

  <div class="card card--red">

    <div class="card__content card--green">
      <div class="card__title card--blue">Row 1</div>
      <div class="card__description card--blue">Row 2</div>
    </div>

    <div class="card__content card--green">
      <div class="card__icon card--blue"></div>
    </div>

  </div>

</div>


<div class="cards cards--last">

  <div class="card card--red">
    <div class="card__title card--green">Row 1</div>
    <div class="card__description card--green">Row 2</div>
  </div>

  <div class="card card--red">
    <div class="card__title card--green">Row 1</div>
    <div class="card__description card--green">Row 2</div>
  </div>

  <div class="card card--red">
    <div class="card__title card--green">Row 1</div>
    <div class="card__description card--green">Row 2</div>
  </div>

  <div class="card card--red">
    <div class="card__title card--green">Row 1</div>
    <div class="card__description card--green">Row 2</div>
  </div>

  <div class="card card--red">
    <div class="card__title card--green">Row 1</div>
    <div class="card__description card--green">Row 2</div>
  </div>

</div>

</body>
</html>
